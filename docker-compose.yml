services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongo:27017/stockMarketDB
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
  redis_data:
